<!DOCTYPE html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Letter</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
      rel="stylesheet"
      href="style.css"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&amp;family=Lora:ital,wght@0,400;0,500;1,400&amp;display=swap"
      rel="stylesheet"
    />

    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  </head>
  <body class="h-full">
    <audio id="bgMusic" loop>
      <source src="kalapastangannn.mp3" type="audio/mpeg" />
    </audio>
    <div id="app" class="relative min-h-full w-full overflow-auto">
      <div class="ambient-glow" style="top: -200px; left: -200px"></div>
      <div
        class="ambient-glow"
        style="bottom: -200px; right: -200px; animation-delay: -4s"
      ></div>

      <div id="particles"></div>

      <section
        id="landingScreen"
        class="min-h-full w-full flex flex-col items-center justify-center px-6 py-12"
      >
        <div class="text-center max-w-2xl">
          <div class="mb-8 fade-in" style="animation-delay: 0.3s">
            <svg
              class="w-16 h-16 mx-auto text-pink-200/40"
              fill="none"
              stroke="currentColor"
              viewbox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1"
                d="M3 19v-8.93a2 2 0 01.89-1.664l7-4.666a2 2 0 012.22 0l7 4.666A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76"
              />
            </svg>
          </div>
          <h1
            id="mainTitle"
            class="title-font text-5xl md:text-7xl font-light text-white glow-text mb-6 fade-in"
            style="animation-delay: 0.5s"
          >
            Happy monthsary baneyneyyy 
          </h1>
          <p
            class="text-pink-200/60 text-lg md:text-xl font-light mb-12 fade-in glow-subtle"
            style="animation-delay: 0.8s"
          >
          <button
            id="openBtn"
            class="letter-btn glass-card px-10 py-4 text-pink-100 text-lg tracking-widest uppercase border border-pink-200/20 rounded-sm fade-in"
            style="animation-delay: 1.1s"
          >
            <span class="relative z-10">Open the Letter</span>
          </button>

          <p
            class="mt-16 text-pink-200/30 text-sm tracking-wider fade-in"
            style="animation-delay: 1.5s"
          >
            ✦ for the one who changed everything ✦
          </p>
        </div>
      </section>
      <!-- Letter Screen -->
      <section
        id="letterScreen"
        class="hidden min-h-full w-full flex items-center justify-center px-4 py-12"
      >
        <div
          class="letter-container glass-card w-full max-w-2xl mx-auto p-8 md:p-12 rounded-sm"
        >
          <!-- Letter header -->
          <div class="text-center mb-10">
            <div
              class="w-12 h-px bg-gradient-to-r from-transparent via-pink-300/50 to-transparent mx-auto mb-6"
            ></div>
            <p
              id="greeting"
              class="title-font text-2xl md:text-3xl text-pink-100 glow-subtle"
            >
              Happy monthsaryyy baneyneyyyy.
            </p>
            <div
              class="w-12 h-px bg-gradient-to-r from-transparent via-pink-300/50 to-transparent mx-auto mt-6"
            ></div>
          </div>

          <div
            id="letterBody"
            class="text-pink-100/90 text-lg md:text-xl leading-relaxed space-y-6 font-light"
          ></div>

          <div
            id="letterClosing"
            class="mt-12 text-right opacity-0 transition-opacity duration-1000"
          >
            <p
              class="title-font text-2xl text-pink-100 glow-subtle"
              id="signatureText"
            >
              rennnrennn
            </p>
          </div>

          <div
            id="letterActions"
            class="mt-12 flex flex-wrap justify-center gap-4 opacity-0 transition-opacity duration-1000"
          >
            <button
              id="readAgainBtn"
              class="letter-btn glass-card px-6 py-3 text-pink-100 text-sm tracking-widest uppercase border border-pink-200/20 rounded-sm"
            >
              <span class="relative z-10">Read Again</span>
            </button>
            <button
              id="oneLastThingBtn"
              class="letter-btn glass-card px-6 py-3 text-pink-100 text-sm tracking-widest uppercase border border-pink-200/20 rounded-sm"
            >
              <span class="relative z-10">One Last Thing...</span>
            </button>
          </div>
        </div>
      </section>

      <div
        id="finalOverlay"
        class="hidden fixed inset-0 z-40 flex items-center justify-center bg-black/80 backdrop-blur-sm"
      >
        <div class="final-reveal text-center px-8 max-w-lg">
          <div class="glass-card p-10 md:p-14 rounded-sm">
            <svg
              class="w-12 h-12 mx-auto text-pink-300/60 mb-6 heartbeat"
              fill="currentColor"
              viewbox="0 0 24 24"
            >
              <path
                d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
              />
            </svg>
            <p
              id="finalMessage"
              class="title-font text-2xl md:text-4xl text-pink-100 glow-text leading-relaxed"
            >
              You matter more than you know.
            </p>
            <p class="text-pink-200/50 text-sm mt-8 tracking-wider">
              And you always will.
            </p>
            <button
              id="closeFinalBtn"
              class="mt-10 text-pink-200/40 hover:text-pink-200/70 text-sm tracking-widest uppercase transition-colors duration-300"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>
    <script>
      const defaultConfig = {
        primary_color: "#ffc0cb",
        secondary_color: "#1a1025",
        text_color: "#fce4ec",
        accent_color: "#8b5cf6",
        background_color: "#0a0a0f",
        font_family: "Lora",
        font_size: 18,
        main_title: "HAPPY 8TH MONTHSARY BANEYNEYYY",
        button_text: "Opennn mooooo hehe",
        greeting: "haiaiaiaiia baneyneyyy",
        closing: "iloveyouuu baneyneyy",
        signature: "rennnrennn",
        final_message: "You matter more than you know.",
      };

      const letterParagraphs = [
  "Haiiaaiaiaiai baneyneyyyy happy monthsaryyy hehe. sorryy kasii lateee akoo nakapag bigayyy sayooo ng letterr baneyneyyyy medjoo mahirapp din kasii tong ngayonn gawinn ee WHAHAHAHAHAH.",

  "Hindii man perfect yung relationship natinn peroo at least nanditoo tayoo ngayonn sa panibagongg monthh saa relation natinn baneyneyyyy kahitt na medjoo makulitt akoo andyann parinn ikaww baneyneyyy.",

  "Lagii man akongg makulitt sayoo baneyneyy peroo suree akoo na lab na labb kitaa baneyneyyy, staka very thankful din talaga akoo ta kahit ganon nga akoo naiintindihan mo parin akoo baneyneyyyyy.",

  "Yunn langg baneyneyyyy, happy monthsaryy ulitt baneyneyyy and iloveyouuuuuuuuuuusoooooomuchhh baneyneyyy iloveyouu more than my words and very very veryy thankful sayooo baneyneyyyyyy mwaaaaaaaaaamwaaaaaaaaaaaa."
];
      let audioContext = null;
      let isPlaying = false;
      let oscillators = [];
      let gainNodes = [];

      function initAudio() {
        if (!audioContext) {
          audioContext = new (window.AudioContext ||
            window.webkitAudioContext)();
        }
        return audioContext;
      }

      function createAmbientSound() {
        const ctx = initAudio();

        const frequencies = [65.41, 98.0, 130.81, 196.0];

        frequencies.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();

          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, ctx.currentTime);

          const lfo = ctx.createOscillator();
          const lfoGain = ctx.createGain();
          lfo.frequency.setValueAtTime(0.5 + i * 0.1, ctx.currentTime);
          lfoGain.gain.setValueAtTime(2, ctx.currentTime);
          lfo.connect(lfoGain);
          lfoGain.connect(osc.frequency);
          lfo.start();

          filter.type = "lowpass";
          filter.frequency.setValueAtTime(800, ctx.currentTime);
          filter.Q.setValueAtTime(1, ctx.currentTime);

          gain.gain.setValueAtTime(0, ctx.currentTime);
          gain.gain.linearRampToValueAtTime(
            0.03 / (i + 1),
            ctx.currentTime + 2
          );

          osc.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);

          osc.start();
          oscillators.push(osc, lfo);
          gainNodes.push(gain);
        });
      }

      function toggleMusic() {
        const musicIcon = document.getElementById("musicIcon");
        const musicPulse = document.getElementById("musicPulse");

        if (!isPlaying) {
          createAmbientSound();
          isPlaying = true;
          musicPulse.style.opacity = "1";
          musicPulse.classList.add("heartbeat");
          musicIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.536 8.464a5 5 0 010 7.072M12 6v12m0-12a4 4 0 00-4 4v4a4 4 0 004 4m0-12a4 4 0 014 4v4a4 4 0 01-4 4m6.364-10.536a9 9 0 010 12.728"/>`;
        } else {
          gainNodes.forEach((gain) => {
            gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 1);
          });
          setTimeout(() => {
            oscillators.forEach((osc) => osc.stop());
            oscillators = [];
            gainNodes = [];
          }, 1000);
          isPlaying = false;
          musicPulse.style.opacity = "0";
          musicPulse.classList.remove("heartbeat");
          musicIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>`;
        }
      }

      function createParticles() {
        const container = document.getElementById("particles");
        container.innerHTML = "";
        const particleCount = window.innerWidth < 768 ? 15 : 30;

        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement("div");
          particle.className = "particle";
          particle.style.left = Math.random() * 100 + "%";
          particle.style.top = Math.random() * 100 + "%";
          particle.style.animationDelay = Math.random() * 15 + "s";
          particle.style.animationDuration = 10 + Math.random() * 10 + "s";
          container.appendChild(particle);
        }
      }

      async function typeText(element, text, speed = 30) {
        return new Promise((resolve) => {
          let i = 0;
          const cursor = document.createElement("span");
          cursor.className = "typing-cursor";
          element.appendChild(cursor);

          const interval = setInterval(() => {
            if (i < text.length) {
              cursor.insertAdjacentText("beforebegin", text.charAt(i));
              i++;
            } else {
              clearInterval(interval);
              cursor.remove();
              resolve();
            }
          }, speed);
        });
      }

      async function typeLetterContent() {
        const letterBody = document.getElementById("letterBody");
        letterBody.innerHTML = "";

        for (let i = 0; i < letterParagraphs.length; i++) {
          const p = document.createElement("p");
          p.className = "mb-6";
          letterBody.appendChild(p);
          await typeText(p, letterParagraphs[i], 25);
          await new Promise((r) => setTimeout(r, 500));
        }

        document.getElementById("letterClosing").style.opacity = "1";
        await new Promise((r) => setTimeout(r, 800));
        document.getElementById("letterActions").style.opacity = "1";
      }

      function openLetter() {
        const landing = document.getElementById("landingScreen");
        const letter = document.getElementById("letterScreen");

        landing.style.opacity = "0";
        landing.style.transform = "scale(0.95)";
        landing.style.transition = "all 0.8s ease";

        setTimeout(() => {
          landing.classList.add("hidden");
          letter.classList.remove("hidden");
          typeLetterContent();
        }, 800);
      }

      function readAgain() {
        document.getElementById("letterClosing").style.opacity = "0";
        document.getElementById("letterActions").style.opacity = "0";
        setTimeout(() => {
          typeLetterContent();
        }, 500);
      }

      function showFinalMessage() {
        const overlay = document.getElementById("finalOverlay");
        overlay.classList.remove("hidden");
      }

      function closeFinalMessage() {
        const overlay = document.getElementById("finalOverlay");
        overlay.style.opacity = "0";
        overlay.style.transition = "opacity 0.5s ease";
        setTimeout(() => {
          overlay.classList.add("hidden");
          overlay.style.opacity = "1";
        }, 500);
      }

      async function onConfigChange(config) {
        const c = { ...defaultConfig, ...config };

        document.getElementById("mainTitle").textContent = c.main_title;
        document.querySelector("#openBtn span").textContent = c.button_text;
        document.getElementById("greeting").textContent = c.greeting;
        document.getElementById("closingText").textContent = c.closing;
        document.getElementById("signatureText").textContent = c.signature;
        document.getElementById("finalMessage").textContent = c.final_message;

        const fontStack = `${c.font_family}, 'Lora', serif`;
        document.body.style.fontFamily = fontStack;

        const baseSize = c.font_size;
        document.getElementById("letterBody").style.fontSize = `${baseSize}px`;
        document.getElementById("mainTitle").style.fontSize = `${
          baseSize * 3.5
        }px`;

        document.body.style.background = `linear-gradient(135deg, ${c.background_color} 0%, ${c.secondary_color} 50%, ${c.background_color} 100%)`;

        document
          .querySelectorAll(
            ".text-pink-100, .text-pink-200, .text-pink-200\\/60, .text-pink-200\\/70"
          )
          .forEach((el) => {
            if (el.classList.contains("text-pink-100")) {
              el.style.color = c.text_color;
            }
          });
      }

      function mapToCapabilities(config) {
        const c = { ...defaultConfig, ...config };

        return {
          recolorables: [
            {
              get: () => c.background_color,
              set: (value) => {
                c.background_color = value;
                window.elementSdk.setConfig({ background_color: value });
              },
            },
            {
              get: () => c.secondary_color,
              set: (value) => {
                c.secondary_color = value;
                window.elementSdk.setConfig({ secondary_color: value });
              },
            },
            {
              get: () => c.text_color,
              set: (value) => {
                c.text_color = value;
                window.elementSdk.setConfig({ text_color: value });
              },
            },
            {
              get: () => c.primary_color,
              set: (value) => {
                c.primary_color = value;
                window.elementSdk.setConfig({ primary_color: value });
              },
            },
            {
              get: () => c.accent_color,
              set: (value) => {
                c.accent_color = value;
                window.elementSdk.setConfig({ accent_color: value });
              },
            },
          ],
          borderables: [],
          fontEditable: {
            get: () => c.font_family,
            set: (value) => {
              c.font_family = value;
              window.elementSdk.setConfig({ font_family: value });
            },
          },
          fontSizeable: {
            get: () => c.font_size,
            set: (value) => {
              c.font_size = value;
              window.elementSdk.setConfig({ font_size: value });
            },
          },
        };
      }

      function mapToEditPanelValues(config) {
        const c = { ...defaultConfig, ...config };
        return new Map([
          ["main_title", c.main_title],
          ["button_text", c.button_text],
          ["greeting", c.greeting],
          ["closing", c.closing],
          ["signature", c.signature],
          ["final_message", c.final_message],
        ]);
      }

      function init() {
        createParticles();

        document.getElementById("openBtn").addEventListener("click", () => {
          document.getElementById("bgMusic").play();
          openLetter();
        });
        document
          .getElementById("readAgainBtn")
          .addEventListener("click", readAgain);
        document
          .getElementById("oneLastThingBtn")
          .addEventListener("click", showFinalMessage);
        document
          .getElementById("closeFinalBtn")
          .addEventListener("click", closeFinalMessage);
        document
          .getElementById("musicToggle")
          .addEventListener("click", toggleMusic);

        document
          .getElementById("finalOverlay")
          .addEventListener("click", (e) => {
            if (e.target === document.getElementById("finalOverlay")) {
              closeFinalMessage();
            }
          });

        window.addEventListener("resize", createParticles);

        if (window.elementSdk) {
          window.elementSdk.init({
            defaultConfig,
            onConfigChange,
            mapToCapabilities,
            mapToEditPanelValues,
          });
        }
      }

      function createHearts() {
        const count = window.innerWidth < 768 ? 10 : 25;
        for (let i = 0; i < count; i++) {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.style.left = Math.random() * 100 + "%";
          heart.style.animationDelay = Math.random() * 5 + "s";
          heart.style.width = 15 + Math.random() * 25 + "px";
          heart.style.height = heart.style.width;
          document.body.appendChild(heart);
        }
      }

      createHearts();

      init();

      (function () {
        function c() {
          var b = a.contentDocument || a.contentWindow.document;
          if (b) {
            var d = b.createElement("script");
            d.innerHTML =
              "window.__CF$cv$params={r:'9da132d7e5ddbc52',t:'MTc3MzEzMzk1Ni4wMDAwMDA='};var a=document.createElement('script');a.nonce='';a.src='/cdn-cgi/challenge-platform/scripts/jsd/main.js';document.getElementsByTagName('head')[0].appendChild(a);";
            b.getElementsByTagName("head")[0].appendChild(d);
          }
        }
        if (document.body) {
          var a = document.createElement("iframe");
          a.height = 1;
          a.width = 1;
          a.style.position = "absolute";
          a.style.top = 0;
          a.style.left = 0;
          a.style.border = "none";
          a.style.visibility = "hidden";
          document.body.appendChild(a);
          if ("loading" !== document.readyState) c();
          else if (window.addEventListener)
            document.addEventListener("DOMContentLoaded", c);
          else {
            var e = document.onreadystatechange || function () {};
            document.onreadystatechange = function (b) {
              e(b);
              "loading" !== document.readyState &&
                ((document.onreadystatechange = e), c());

          }

      })();
    </script>
  </body>
</html>
